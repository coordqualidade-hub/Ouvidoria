<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recesso — Grupo On+</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  :root { --brand: #1a237e; --brand-dark: #0d1257; --brand-light: #e8eaf6; --gray-100: #f5f5f5; --gray-200: #eeeeee; --gray-400: #bdbdbd; --gray-600: #757575; --gray-800: #424242; }
  .wrapper { width: 100%; max-width: 620px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
  .card-header { background: var(--brand); padding: 1.75rem 1.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .card-header-text small { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); display: block; margin-bottom: 4px; }
  .card-header-text h2 { font-size: 22px; font-weight: 600; color: #fff; }
  .card-header-text p { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 6px; }
  .card-header img { height: 70px; flex-shrink: 0; margin-left: 1.5rem; }
  .card-body { padding: 1.75rem; }
  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-800); margin-bottom: 6px; }
  label .req { color: #c62828; margin-left: 2px; }
  label .hint { font-weight: 400; color: var(--gray-600); font-size: 12px; margin-left: 4px; }
  input[type="text"], input[type="email"], input[type="date"], textarea, select {
    width: 100%; padding: 10px 13px; border: 1.5px solid var(--gray-400); border-radius: 7px;
    font-size: 14px; font-family: inherit; color: var(--gray-800); background: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(26,35,126,0.1); }
  textarea { resize: vertical; min-height: 100px; }
  .divider { border: none; border-top: 1.5px solid var(--gray-200); margin: 1.5rem 0; }
  .radio-group, .check-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-item, .check-item { display: flex; align-items: center; gap: 10px; padding: 10px 13px; border: 1.5px solid var(--gray-200); border-radius: 7px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .radio-item:hover, .check-item:hover { border-color: var(--brand); background: var(--brand-light); }
  .radio-item input, .check-item input { width: 16px; height: 16px; accent-color: var(--brand); flex-shrink: 0; }
  .radio-item label, .check-item label { font-size: 14px; font-weight: 400; color: var(--gray-800); cursor: pointer; margin: 0; }
  .section-box { background: var(--gray-100); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; border-left: 4px solid var(--brand); }
  .section-box h3 { font-size: 13px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
  .hidden { display: none; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:480px) { .grid-2 { grid-template-columns: 1fr; } }
  .submit-btn { width: 100%; padding: 13px; background: var(--brand); color: #fff; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: background 0.2s; margin-top: 0.5rem; }
  .submit-btn:hover { background: var(--brand-dark); }
  .submit-btn:disabled { background: var(--gray-400); cursor: not-allowed; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .alert { padding: 12px 16px; border-radius: 7px; font-size: 13px; margin-bottom: 1rem; }
  .alert-error { background: #ffebee; color: #b71c1c; border: 1px solid #ef9a9a; }
  .success-wrap { text-align: center; padding: 2.5rem 1rem; }
  .success-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--brand-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .success-wrap h2 { font-size: 22px; font-weight: 600; color: var(--brand); margin-bottom: 8px; }
  .success-wrap .protocolo { font-size: 28px; font-weight: 700; color: var(--brand); letter-spacing: 0.06em; margin: 0.5rem 0 1rem; }
  .success-wrap p { font-size: 14px; color: var(--gray-600); line-height: 1.6; max-width: 360px; margin: 0 auto 1.5rem; }
  .outline-btn { display: inline-block; padding: 9px 22px; border: 2px solid var(--brand); border-radius: 7px; color: var(--brand); font-size: 14px; font-weight: 600; cursor: pointer; background: none; font-family: inherit; }
  .footer { text-align: center; font-size: 12px; color: var(--gray-600); margin-top: 1.25rem; }
</style>
</head>

    <div class="card-body">

      <div id="error-msg" class="alert alert-error" style="display:none;"></div>

      <div id="form-wrap">

        <!-- DADOS DO SOLICITANTE -->
        <div class="form-group">
          <label>E-mail <span class="req">*</span></label>
          <input type="email" id="email" placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label>Solicitante <span class="req">*</span></label>
          <input type="text" id="solicitante" placeholder="Nome completo" />
        </div>

        <!-- UNIDADES -->
        <div class="form-group">
          <label>Unidade de atuação <span class="req">*</span></label>
          <select id="unidade">
            <option value="">Selecione a unidade...</option>
            <option>CENTRO DE ESPECIALIDADES KALIANE SILVA</option>
            <option>HAC MARITUBA</option>
            <option>HOSPITAL BENITO PRIANTE</option>
            <option>HOSPITAL DR. SILAS FREITAS</option>
            <option>HOSPITAL EDILSON ABREU</option>
            <option>HOSPITAL GERAL DE ALTAMIRA</option>
            <option>HOSPITAL GERAL MOSQUEIRO</option>
            <option>HOSPITAL ORDEM TERCEIRA - SANTA MARIA DO PARÁ</option>
            <option>HOSPITAL PÚBLICO CASTELO DOS SONHOS</option>
            <option>HOSPITAL SANTA TEREZINHA</option>
            <option>HPSM 14</option>
            <option>HPSM GUAMÁ</option>
            <option>SAMU BELÉM</option>
            <option>SAMU MARITUBA</option>
            <option>SAÚDE CENTER</option>
            <option>UMS COLARES</option>
            <option>UMS MURININ</option>
            <option>UPA ALTAMIRA</option>
            <option>UPA BENEVIDES</option>
            <option>UPA MARITUBA</option>
          </select>
        </div>

        <hr class="divider">

        <!-- PERÍODO -->
        <div class="grid-2">
          <div class="form-group">
            <label>Data de saída <span class="req">*</span></label>
            <input type="date" id="data-saida" />
          </div>
          <div class="form-group">
            <label>Data de retorno <span class="req">*</span></label>
            <input type="date" id="data-retorno" />
          </div>
        </div>

        <div class="form-group">
          <label>Natureza / Justificativa <span class="req">*</span></label>
          <textarea id="justificativa" placeholder="Descreva o motivo do recesso..."></textarea>
        </div>

        <hr class="divider">

        <!-- MAIS DE 10 DIAS -->
        <div class="form-group">
          <label>O período totaliza mais de 10 dias? <span class="req">*</span></label>
          <div class="radio-group">
            <div class="radio-item"><input type="radio" name="mais10" id="mais10-sim" value="Sim" onchange="toggleInterino(true)"><label for="mais10-sim">Sim</label></div>
            <div class="radio-item"><input type="radio" name="mais10" id="mais10-nao" value="Não" onchange="toggleInterino(false)"><label for="mais10-nao">Não</label></div>
          </div>
        </div>

        <!-- SEÇÃO INTERINO (aparece só se > 10 dias) -->
        <div class="section-box hidden" id="secao-interino">
          <h3>Direção Interina</h3>

          <div class="form-group">
            <label>Nome do interino <span class="req">*</span></label>
            <input type="text" id="interino-nome" placeholder="Nome completo do interino" />
          </div>

          <div class="form-group">
            <label>CRM do interino <span class="req">*</span></label>
            <input type="text" id="interino-crm" placeholder="Ex: CRM/PA 12345" />
          </div>

          <div class="form-group">
            <label>O interino está ciente e concorda com a suplência? <span class="req">*</span></label>
            <div class="radio-group">
              <div class="radio-item"><input type="radio" name="interino-ciente" id="ciente-sim" value="Sim"><label for="ciente-sim">Sim</label></div>
              <div class="radio-item"><input type="radio" name="interino-ciente" id="ciente-nao" value="Não"><label for="ciente-nao">Não</label></div>
            </div>
          </div>

          <div class="form-group" style="margin-bottom:0">
            <label>Dados bancários do interino <span class="hint">(Banco, agência, conta, pix)</span></label>
            <textarea id="interino-banco" placeholder="Ex: Banco do Brasil, Ag. 1234-5, CC 00001-2, Pix: cpf@email.com"></textarea>
          </div>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="enviar()">Enviar solicitação</button>
      </div>

      <!-- SUCESSO -->
      <div id="success-wrap" style="display:none;" class="success-wrap">
        <div class="success-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1a237e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>Solicitação enviada!</h2>
        <p>Seu número de protocolo é:</p>
        <div class="protocolo" id="protocolo-display"></div>
        <p>Guarde este número para acompanhar sua solicitação.</p>
        <button class="outline-btn" onclick="resetForm()">Nova solicitação</button>
      </div>

    </div>
  </div>
  <div class="footer">Todas as informações são protegidas e tratadas com confidencialidade.</div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQii0sXbW3qWFDxFknnY-yE6UuGg7svbC54UgFMq9EXRCi4RYw89JPwPsi-vUIvuhW/exec';

  function toggleInterino(show) {
    document.getElementById('secao-interino').classList.toggle('hidden', !show);
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function clearError() {
    document.getElementById('error-msg').style.display = 'none';
  }

  async function enviar() {
    clearError();

    const email = document.getElementById('email').value.trim();
    const solicitante = document.getElementById('solicitante').value.trim();
    const unidades = [document.getElementById('unidade').value];
    const dataSaida = document.getElementById('data-saida').value;
    const dataRetorno = document.getElementById('data-retorno').value;
    const justificativa = document.getElementById('justificativa').value.trim();
    const mais10 = document.querySelector('input[name="mais10"]:checked');

    if (!email) { showError('Informe seu e-mail.'); return; }
    if (!solicitante) { showError('Informe o nome do solicitante.'); return; }
    if (!unidades[0]) { showError('Selecione a unidade de atuação.'); return; }
    if (!dataSaida) { showError('Informe a data de saída.'); return; }
    if (!dataRetorno) { showError('Informe a data de retorno.'); return; }
    if (!justificativa) { showError('Informe a natureza/justificativa.'); return; }
    if (!mais10) { showError('Informe se o período totaliza mais de 10 dias.'); return; }

    let interinoNome = '', interinoCrm = '', interinoCiente = '', interinoBanco = '';
    if (mais10.value === 'Sim') {
      interinoNome = document.getElementById('interino-nome').value.trim();
      interinoCrm = document.getElementById('interino-crm').value.trim();
      const ciente = document.querySelector('input[name="interino-ciente"]:checked');
      interinoCiente = ciente ? ciente.value : '';
      interinoBanco = document.getElementById('interino-banco').value.trim();
      if (!interinoNome) { showError('Informe o nome do interino.'); return; }
      if (!interinoCrm) { showError('Informe o CRM do interino.'); return; }
      if (!interinoCiente) { showError('Informe se o interino está ciente da suplência.'); return; }
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Enviando...';

    const payload = {
      action: 'salvarRecesso',
      email, solicitante,
      unidades: unidades.join(', '),
      dataSaida, dataRetorno, justificativa,
      mais10: mais10.value,
      interinoNome, interinoCrm, interinoCiente, interinoBanco
    };

    try {
      const resp = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
      const data = await resp.json();
      if (data.status === 'ok') {
        document.getElementById('protocolo-display').textContent = data.protocolo;
        document.getElementById('form-wrap').style.display = 'none';
        document.getElementById('success-wrap').style.display = 'block';
      } else {
        showError('Erro ao enviar: ' + (data.message || 'Tente novamente.'));
        btn.disabled = false;
        btn.textContent = 'Enviar solicitação';
      }
    } catch(e) {
      showError('Não foi possível conectar ao servidor. Verifique sua conexão.');
      btn.disabled = false;
      btn.textContent = 'Enviar solicitação';
    }
  }

  function resetForm() {
    document.querySelectorAll('input[type="text"], input[type="email"], input[type="date"], textarea').forEach(el => el.value = '');
    document.querySelectorAll('input[type="checkbox"], input[type="radio"]').forEach(el => el.checked = false);
    document.getElementById('secao-interino').classList.add('hidden');
    document.getElementById('form-wrap').style.display = 'block';
    document.getElementById('success-wrap').style.display = 'none';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = 'Enviar solicitação';
    clearError();
  }
</script>
</body>
</html>
